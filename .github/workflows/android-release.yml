name: Android Release Build

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type: debug or release"
        required: true
        default: "debug"
        type: choice
        options:
          - debug
          - release
      skip_sign:
        description: "Skip APK signing (only for release builds, produces unsigned APK that cannot be installed)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      upload_artifacts:
        description: "Upload build artifacts to GitHub"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  ANDROID_COMPILE_SDK: "36"
  ANDROID_API: "35"

jobs:
  build:
    name: Build Android APK
    runs-on: [self-hosted, macOS]
    defaults:
      run:
        working-directory: android

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: recursive

      - name: Determine build type
        id: config
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "build_type=release" >> "$GITHUB_OUTPUT"
            echo "skip_sign=false" >> "$GITHUB_OUTPUT"
          else
            echo "build_type=${{ inputs.build_type }}" >> "$GITHUB_OUTPUT"
            echo "skip_sign=${{ inputs.skip_sign }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup keystore for signed release build
        if: steps.config.outputs.build_type == 'release' && steps.config.outputs.skip_sign == 'false'
        run: |
          echo "==> Setting up keystore from GitHub Secrets"
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > app/release.keystore
          echo "ANDROID_KEYSTORE_FILENAME=app/release.keystore" >> "$GITHUB_ENV"
          echo "ANDROID_KEYSTORE_ALIAS=${{ secrets.ANDROID_KEYSTORE_ALIAS }}" >> "$GITHUB_ENV"
          echo "ANDROID_KEYSTORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" >> "$GITHUB_ENV"

      - name: Set SKIP_SIGN for unsigned release build
        if: steps.config.outputs.build_type == 'release' && steps.config.outputs.skip_sign == 'true'
        run: |
          echo "==> Building unsigned release APK (cannot be installed on devices)"
          echo "SKIP_SIGN=true" >> "$GITHUB_ENV"

      - name: Bootstrap
        run: just bootstrap

      - name: Generate models
        run: just generate-models

      - name: Build Debug APK
        if: steps.config.outputs.build_type == 'debug'
        run: just build
        env:
          GPR_USERNAME: ${{ github.actor }}
          GPR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Release APK
        if: steps.config.outputs.build_type == 'release'
        run: ./gradlew assembleGoogleRelease --no-configuration-cache
        env:
          GPR_USERNAME: ${{ github.actor }}
          GPR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List build outputs
        run: |
          echo "==> Build outputs:"
          find app/build/outputs -type f \( -name '*.apk' -o -name '*.aab' \) | while read f; do
            echo "  $f ($(du -h "$f" | cut -f1))"
          done

      - name: Upload Debug APK
        if: steps.config.outputs.build_type == 'debug' && (github.event_name == 'workflow_dispatch' && inputs.upload_artifacts == 'true' || github.event_name == 'push')
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: android-debug-apk
          path: android/app/build/outputs/apk/google/debug/*.apk
          retention-days: 30

      - name: Upload Release APK
        if: steps.config.outputs.build_type == 'release' && (github.event_name == 'workflow_dispatch' && inputs.upload_artifacts == 'true' || github.event_name == 'push')
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: android-release-apk${{ steps.config.outputs.skip_sign == 'true' && '-unsigned' || '' }}
          path: android/app/build/outputs/apk/google/release/*.apk
          retention-days: 30

      - name: Clean up keystore
        if: always()
        run: |
          rm -f app/release.keystore
